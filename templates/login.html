<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Connexion - Le Comptoir</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        .auth-container {
            max-width: 450px;
            margin: 80px auto;
            background: var(--bg-elevated);
            padding: 40px;
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-subtle);
        }
        h2 { font-family: var(--font-display); margin-bottom: 24px; color: var(--accent-gold); }
    </style>
</head>
<body>
    <header class="site-header">
        <a href="/" class="btn btn-ghost">Retour à la boutique</a>
    </header>

    <div class="auth-container">
        <h2>Espace Connexion</h2>
        <form id="login-form">
            <label class="field">
                <span>Email</span>
                <input type="email" id="email" required placeholder="votre@email.com">
            </label>
            <label class="field">
                <span>Mot de passe</span>
                <input type="password" id="password" required placeholder="••••••">
            </label>
            
            <p id="login-error" class="form-error" style="margin-top: 15px;" hidden></p>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 20px;">Se connecter</button>
        </form>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: email, mot_de_passe: password })
            });
            const data = await res.json();
            
            if (!res.ok) { 
                const errorEl = document.getElementById('login-error');
                errorEl.textContent = data.detail; 
                errorEl.hidden = false; 
                return; 
            }
            
            localStorage.setItem('le-comptoir-token', data.access_token);
            localStorage.setItem('le-comptoir-email', data.client.email);
            
            window.location.href = data.client.email === 'admin@test.com' ? '/admin' : '/';
        });
    </script>
</body>
</html>
