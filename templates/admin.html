<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Administration - Le Comptoir</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        .admin-container { max-width: 1000px; margin: 40px auto; padding: 20px; }
        .catalogue-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 22px; }
        .admin-actions { display: flex; gap: 8px; margin-top: 10px; }
        .btn-sm { padding: 6px 12px; font-size: 12px; border: none; cursor: pointer; border-radius: 999px; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 100; align-items: center; justify-content: center; }
        .modal-content { background: var(--bg-elevated); padding: 30px; border-radius: 12px; width: 400px; max-width: 90%; }
        select { background: var(--bg-elevated); color: white; border: 1px solid var(--border-subtle); }
    </style>
</head>
<body>
    <header class="site-header">
        <div class="brand"><span class="brand-name">ADMINISTRATION</span></div>
        <a href="/" class="btn btn-ghost">Retour à la boutique</a>
    </header>

    <div class="admin-container">
        <h2>Ajouter un produit</h2>
        <form id="add-product-form" style="background: var(--bg-elevated); padding: 20px; border-radius: 12px; margin-bottom: 40px;">
            <input type="text" id="p-libelle" placeholder="Nom" required style="width: 100%; margin-bottom: 10px; padding: 8px;">
            <input type="number" step="0.01" id="p-prix" placeholder="Prix" required style="width: 100%; margin-bottom: 10px; padding: 8px;">
            <input type="text" id="p-photo" placeholder="URL Image" style="width: 100%; margin-bottom: 10px; padding: 8px;">
            <textarea id="p-desc" placeholder="Description" style="width: 100%; margin-bottom: 10px; padding: 8px;"></textarea>
            
            <label style="display:block; margin-bottom:5px;">Catégorie :</label>
            <select id="p-categorie" required style="width: 100%; margin-bottom: 10px; padding: 8px;"></select>
            
            <button type="submit" class="btn btn-primary">Ajouter le produit</button>
        </form>

        <h2>Gestion des produits</h2>
        <div class="catalogue-grid" id="admin-produits"></div>
    </div>

    <!-- نافذة التعديل -->
    <div id="edit-modal" class="modal">
        <form id="edit-product-form" class="modal-content">
            <h3 style="margin-top:0; color: var(--accent-gold);">Modifier le produit</h3>
            <input type="hidden" id="edit-id">
            <input type="text" id="edit-libelle" required style="width: 100%; margin-bottom: 10px; padding: 8px;">
            <input type="number" step="0.01" id="edit-prix" required style="width: 100%; margin-bottom: 10px; padding: 8px;">
            <input type="text" id="edit-photo" style="width: 100%; margin-bottom: 10px; padding: 8px;">
            <textarea id="edit-desc" style="width: 100%; margin-bottom: 10px; padding: 8px;"></textarea>
            <select id="edit-categorie" required style="width: 100%; margin-bottom: 20px; padding: 8px;"></select>
            
            <div style="display: flex; gap: 10px; justify-content: flex-end;">
                <button type="button" class="btn btn-ghost" onclick="closeEditModal()">Annuler</button>
                <button type="submit" class="btn btn-primary">Enregistrer</button>
            </div>
        </form>
    </div>

    <script>
        const token = localStorage.getItem('le-comptoir-token');
        if (!token) window.location.href = "/login";

        let allProducts = [];

        // تحميل التصنيفات للقائمة المنسدلة
        async function loadCategories() {
            const res = await fetch('/api/categories');
            const cats = await res.json();
            const options = cats.map(c => `<option value="${c.id_categorie}">${c.nom}</option>`).join('');
            document.getElementById('p-categorie').innerHTML = options;
            document.getElementById('edit-categorie').innerHTML = options;
        }

        async function loadAdminProducts() {
            const res = await fetch('/api/produits');
            allProducts = await res.json();
            document.getElementById('admin-produits').innerHTML = allProducts.map(p => `
                <article class="produit-card">
                    <img class="produit-photo" src="${p.photo || 'https://picsum.photos/500'}" alt="${p.libelle}">
                    <div class="produit-body">
                        <h3 class="produit-name">${p.libelle}</h3>
                        <p class="produit-price">${p.prix} €</p>
                        <div class="admin-actions">
                            <button class="btn btn-primary btn-sm" onclick="openEditModal(${p.id_produit})">Modifier</button>
                            <button class="btn btn-danger btn-sm" onclick="deleteProduct(${p.id_produit})" style="background:var(--accent-berry);">Supprimer</button>
                        </div>
                    </div>
                </article>
            `).join('');
        }

        async function deleteProduct(id) {
            if(!confirm("Supprimer ce produit ?")) return;
            await fetch(`/api/produits/${id}`, { method: 'DELETE', headers: { 'Authorization': `Bearer ${token}` }});
            loadAdminProducts();
        }

        document.getElementById('add-product-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const payload = {
                libelle: document.getElementById('p-libelle').value,
                prix: parseFloat(document.getElementById('p-prix').value),
                photo: document.getElementById('p-photo').value || "https://picsum.photos/500",
                id_categorie: parseInt(document.getElementById('p-categorie').value),
                description: document.getElementById('p-desc').value
            };
            const res = await fetch('/api/produits', { 
                method: 'POST', 
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }, 
                body: JSON.stringify(payload) 
            });
            if (res.ok) { e.target.reset(); loadAdminProducts(); }
            else { alert("Erreur d'ajout."); }
        });

        function openEditModal(id) {
            const p = allProducts.find(x => x.id_produit === id);
            document.getElementById('edit-id').value = p.id_produit;
            document.getElementById('edit-libelle').value = p.libelle;
            document.getElementById('edit-prix').value = p.prix;
            document.getElementById('edit-photo').value = p.photo || '';
            document.getElementById('edit-categorie').value = p.id_categorie;
            document.getElementById('edit-desc').value = p.description || '';
            document.getElementById('edit-modal').style.display = 'flex';
        }

        function closeEditModal() { document.getElementById('edit-modal').style.display = 'none'; }

        document.getElementById('edit-product-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('edit-id').value;
            const payload = {
                libelle: document.getElementById('edit-libelle').value,
                prix: parseFloat(document.getElementById('edit-prix').value),
                photo: document.getElementById('edit-photo').value,
                id_categorie: parseInt(document.getElementById('edit-categorie').value),
                description: document.getElementById('edit-desc').value
            };
            const res = await fetch(`/api/produits/${id}`, { method: 'PUT', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }, body: JSON.stringify(payload) });
            if (res.ok) { closeEditModal(); loadAdminProducts(); }
            else { alert("Erreur de modification."); }
        });

        // Initialize
        loadCategories();
        loadAdminProducts();
    </script>
</body>
</html>
